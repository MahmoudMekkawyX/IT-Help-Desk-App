<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ================= META ================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xceed | Change Password</title>

    <!-- ================= STYLES ================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ================= PAGE STYLE ================= -->
    <style>
        .change-password-container {
            max-width: 500px;
            margin: 80px auto;
        }

        .warning-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .password-requirements {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <div class="brand-icon">
                    <i class="fas fa-crown"></i>
                    <span>Xceed<span class="text-accent">Hub</span></span>
                </div>
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                </ul>

                <div class="d-flex gap-2">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" class="search-input" placeholder="Search...">
                    </div>

                    <button class="theme-toggle" id="darkModeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ================= MAIN ================= -->
    <main class="container">
        <div class="change-password-container">

            <div class="modern-card p-4">

                <!-- Header -->
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-accent mb-3"></i>
                    <h3>Change Password</h3>
                    <p class="text-muted">Update your password securely</p>
                </div>

                <!-- First Login Warning -->
                <div class="warning-banner" id="firstLoginWarning">
                    <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                    <strong>Security Notice:</strong> This is your first login. Please set a new password.
                </div>

                <!-- Form -->
                <form id="changePasswordForm">

                    <!-- Current Password -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Current Password</label>
                        <input type="password" id="currentPassword" class="form-control-custom" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('currentPassword', this)"></i>
                    </div>

                    <!-- New Password -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-control-custom" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>

                        <div class="password-requirements">
                            ✔ Minimum 6 characters
                        </div>
                    </div>

                    <!-- Confirm -->
                    <div class="mb-4 position-relative">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmPassword" class="form-control-custom" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>

                    <!-- Messages -->
                    <div id="errorMessage" class="alert alert-danger d-none"></div>
                    <div id="successMessage" class="alert alert-success d-none"></div>

                    <!-- Submit -->
                    <button type="submit" class="btn-custom w-100">
                        <i class="fas fa-save me-2"></i> Update Password
                    </button>
                </form>

                <!-- Logout -->
                <div class="text-center mt-3">
                    <a href="#" onclick="logout()" class="text-muted small">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>

            </div>
        </div>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="mt-5 text-center">
        <p>© 2025 Xceed Enterprise Help Desk Hub</p>
    </footer>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-auth.js"></script>
    <script src="js/script.js"></script>

    <!-- ================= PAGE LOGIC ================= -->
    <script>

        // Toggle password visibility
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {

            // Check auth
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const user = getCurrentUser();

            // Hide warning if not first login
            if (!user.mustChangePassword) {
                document.getElementById('firstLoginWarning').style.display = 'none';
            }

            // Dark mode
            const toggle = document.getElementById('darkModeToggle');
            const saved = localStorage.getItem('theme');

            if (saved === 'dark') {
                document.body.classList.add('dark-mode');
                toggle.innerHTML = '<i class="fas fa-sun"></i>';
            }

            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                toggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

        });

        // Submit form
        document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const current = currentPassword.value;
            const newPass = newPassword.value;
            const confirm = confirmPassword.value;

            const error = document.getElementById('errorMessage');
            const success = document.getElementById('successMessage');

            error.classList.add('d-none');
            success.classList.add('d-none');

            // Validation
            if (newPass !== confirm) {
                error.textContent = 'Passwords do not match';
                error.classList.remove('d-none');
                return;
            }

            if (newPass.length < 6) {
                error.textContent = 'Minimum 6 characters required';
                error.classList.remove('d-none');
                return;
            }

            if (current === newPass) {
                error.textContent = 'New password must be different';
                error.classList.remove('d-none');
                return;
            }

            // Call API
            const result = await changePassword(current, newPass);

            if (result.success) {
                success.textContent = 'Password updated successfully';
                success.classList.remove('d-none');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                error.textContent = result.message;
                error.classList.remove('d-none');
            }
        });

    </script>

</body>

</html>
