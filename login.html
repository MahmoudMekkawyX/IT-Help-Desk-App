<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xceed | Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- أضف هذا السكربت في جميع صفحات HTML -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0f2b3d;
            --accent: #2d9c7c;
            --accent-light: #3dbd98;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2b3d 0%, #1a3d55 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo i {
            font-size: 3rem;
            color: var(--accent);
        }
        
        .logo h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 0.5rem;
        }
        
        .logo p {
            color: #64748b;
            font-size: 0.875rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #334155;
        }
        
        .input-group-custom {
            position: relative;
        }
        
        .input-group-custom i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        
        .form-control-custom {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .form-control-custom:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 156, 124, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        
        .btn-outline-secondary-custom {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            color: #64748b;
        }
        
        .btn-outline-secondary-custom:hover {
            background: #f8fafc;
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .alert-message {
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
        }
        
        .alert-success {
            background: #dcfce7;
            color: #10b981;
            border: 1px solid #bbf7d0;
        }
        
        .users-list {
            margin-top: 1rem;
            max-height: 350px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        
        .users-list .list-group-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .users-list .list-group-item:hover {
            background: #f1f5f9;
            border-left: 3px solid var(--accent);
        }
        
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .default-password-badge {
            background: #fef3c7;
            color: #d97706;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }
            .login-card {
                padding: 1.5rem;
            }
        }
        
        /* Custom scrollbar */
        .users-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .users-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .users-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <h2>Xceed<span style="color: var(--accent);">Hub</span></h2>
                <p>Enterprise Help Desk Portal</p>
            </div>
            
            <div id="infoMessage" class="alert-message alert-info">
                <i class="fas fa-info-circle me-2"></i> Default password: <strong>123456</strong>
            </div>
            
            <div id="errorMessage" class="alert-message alert-error">
                <i class="fas fa-exclamation-circle me-2"></i> Invalid username or password
            </div>
            
            <div id="successMessage" class="alert-message alert-success">
                <i class="fas fa-check-circle me-2"></i> Login successful! Redirecting...
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-group-custom">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control-custom" placeholder="Enter your username" autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control-custom" placeholder="Enter your password">
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i> Sign In
                </button>
            </form>
            
            <!-- Show Users Button -->
            <div class="mt-4">
                <!-- <button type="button" class="btn-outline-secondary-custom" id="showUsersBtn">
                    <i class="fas fa-users me-2"></i> Show Available Users
                </button> -->
                
                <div id="usersList" class="users-list" style="display: none;">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item bg-light fw-bold">
                            <div class="row">
                                <div class="col-5">Username</div>
                                <div class="col-7">Name</div>
                            </div>
                        </div>
                        <div id="usersListContainer">
                            <div class="list-group-item text-center text-muted">Loading users...</div>
                        </div>
                    </div>
                    <div class="text-center py-2 bg-light">
                        <span class="default-password-badge">
                            <i class="fas fa-key me-1"></i> Default password: 123456
                        </span>
                    </div>
                </div>
            </div>
            
            <div class="footer-text">
                <i class="fas fa-shield-alt me-1"></i> Secure Enterprise Access
            </div>
        </div>
    </div>
    
    <script>
        // Show info message and auto hide after 5 seconds
        const infoMessage = document.getElementById('infoMessage');
        if (infoMessage) {
            infoMessage.style.display = 'block';
            setTimeout(function() {
                infoMessage.style.display = 'none';
            }, 5000);
        }
        
        // Show/Hide users list
        const showUsersBtn = document.getElementById('showUsersBtn');
        const usersList = document.getElementById('usersList');
        
        if (showUsersBtn) {
            showUsersBtn.addEventListener('click', function() {
                if (usersList.style.display === 'none' || usersList.style.display === '') {
                    usersList.style.display = 'block';
                    showUsersBtn.innerHTML = '<i class="fas fa-chevron-up me-2"></i> Hide Users List';
                } else {
                    usersList.style.display = 'none';
                    showUsersBtn.innerHTML = '<i class="fas fa-users me-2"></i> Show Available Users';
                }
            });
        }
        
        // Load users from IndexedDB
        async function loadUsersList() {
            const container = document.getElementById('usersListContainer');
            if (!container) return;
            
            try {
                // Check if getAllUsers function exists
                if (typeof getAllUsers !== 'function') {
                    console.error('getAllUsers function not found');
                    container.innerHTML = '<div class="list-group-item text-center text-muted">Users database not ready</div>';
                    return;
                }
                
                const users = await getAllUsers();
                
                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="list-group-item text-center text-muted">No users found</div>';
                    return;
                }
                
                // Sort users by username
                users.sort(function(a, b) {
                    return a.username.localeCompare(b.username);
                });
                
                container.innerHTML = users.map(function(user) {
                    return `
                        <div class="list-group-item list-group-item-action" onclick="selectUser('${user.username}')">
                            <div class="row align-items-center">
                                <div class="col-5">
                                    <code class="text-primary">${escapeHtml(user.username)}</code>
                                </div>
                                <div class="col-7">
                                    <i class="fas fa-user-circle text-muted me-1"></i>
                                    ${escapeHtml(user.name || user.username)}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch(error) {
                console.error('Error loading users:', error);
                container.innerHTML = '<div class="list-group-item text-center text-danger">Error loading users</div>';
            }
        }
        
        // Select user function
        function selectUser(username) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            if (usernameInput) {
                usernameInput.value = username;
                usernameInput.focus();
            }
            
            if (passwordInput) {
                passwordInput.focus();
            }
            
            // Auto hide users list after selection on mobile
            if (window.innerWidth < 768 && usersList) {
                usersList.style.display = 'none';
                if (showUsersBtn) {
                    showUsersBtn.innerHTML = '<i class="fas fa-users me-2"></i> Show Available Users';
                }
            }
        }
        
        // Escape HTML function
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Login form handler
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const errorDiv = document.getElementById('errorMessage');
                const successDiv = document.getElementById('successMessage');
                
                const username = usernameInput ? usernameInput.value.trim() : '';
                const password = passwordInput ? passwordInput.value : '';
                
                // Hide previous messages
                if (errorDiv) errorDiv.style.display = 'none';
                if (successDiv) successDiv.style.display = 'none';
                
                if (!username || !password) {
                    if (errorDiv) {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> Please enter both username and password';
                        errorDiv.style.display = 'block';
                    }
                    return;
                }
                
                // Check if login function exists
                if (typeof login !== 'function') {
                    console.error('login function not found');
                    if (errorDiv) {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> System error. Please refresh the page.';
                        errorDiv.style.display = 'block';
                    }
                    return;
                }
                
                try {
                    const result = await login(username, password);
                    
                    if (result.success) {
                        if (successDiv) {
                            successDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i> Login successful! Redirecting...';
                            successDiv.style.display = 'block';
                        }
                        
                        setTimeout(function() {
                            if (result.mustChangePassword) {
                                window.location.href = 'change-password.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 1000);
                    } else {
                        if (errorDiv) {
                            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> ' + result.message;
                            errorDiv.style.display = 'block';
                        }
                    }
                } catch(error) {
                    console.error('Login error:', error);
                    if (errorDiv) {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> An error occurred. Please try again.';
                        errorDiv.style.display = 'block';
                    }
                }
            });
        }
        
        // Check if already logged in
        if (typeof isAuthenticated === 'function' && isAuthenticated()) {
            const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
            if (user && user.mustChangePassword) {
                window.location.href = 'ChangePassword.html';
            } else if (user) {
                window.location.href = 'index.html';
            }
        }
        
        // Load users list when page loads
        setTimeout(function() {
            loadUsersList();
        }, 500);
    </script>
    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-auth.js"></script>
    <script src="js/supabase-tickets.js"></script>
    <script src="js/supabase-assets.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
