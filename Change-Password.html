<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xceed | Change Password</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <style>
        .change-password-container {
            max-width: 500px;
            margin: 80px auto;
        }
        .warning-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .password-requirements {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        .password-requirements i {
            width: 16px;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <div class="brand-icon">
                    <i class="fas fa-crown"></i>
                    <span>Xceed<span class="text-accent">Hub</span></span>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    
                </ul>
                <div class="d-flex gap-2">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="globalSearch" placeholder="Search..." class="search-input">
                    </div>
                    <button class="theme-toggle" id="darkModeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="change-password-container">
            <div class="modern-card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-accent mb-3"></i>
                    <h3>Change Password</h3>
                    <p class="text-muted">Please change your temporary password to continue</p>
                </div>
                
                <div class="warning-banner">
                    <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                    <strong>Security Notice:</strong> This is your first login. Please set a new password.
                </div>
                
                <form id="changePasswordForm">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" id="currentPassword" class="form-control-custom" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-control-custom" required>
                        <div class="password-requirements">
                            <i class="fas fa-check-circle"></i> Minimum 6 characters
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmPassword" class="form-control-custom" required>
                    </div>
                    
                    <div id="errorMessage" class="alert alert-danger d-none"></div>
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    
                    <button type="submit" class="btn-custom w-100">
                        <i class="fas fa-save me-2"></i> Update Password
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="#" onclick="logout()" class="text-muted small">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-5">
        <div class="container">
            <p>© 2025 Xceed Enterprise Help Desk Hub | Secure Password Management</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-auth.js"></script>
    <script src="js/supabase-tickets.js"></script>
    <script src="js/supabase-assets.js"></script>
    <script src="js/script.js"></script>    <script>
        // Redirect if not authenticated or not required to change password
        document.addEventListener('DOMContentLoaded', function() {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            
            const user = getCurrentUser();
            if (!user.mustChangePassword) {
                window.location.href = 'index.html';
            }
            
            // Update user name
            const userNameSpan = document.getElementById('userName');
            if (userNameSpan && user.name) {
                userNameSpan.textContent = user.name;
            }
        });
        
        // Dark mode toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (darkModeToggle) {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            
            darkModeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                this.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        // Change password form handler
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Hide previous messages
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');
            
            // Validate
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'New passwords do not match';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            if (newPassword.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            if (currentPassword === newPassword) {
                errorDiv.textContent = 'New password must be different from current password';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            const result = await changePassword(currentPassword, newPassword);
            
            if (result.success) {
                successDiv.textContent = result.message + '. Redirecting to dashboard...';
                successDiv.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                errorDiv.textContent = result.message;
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
    
</body>
</html>
